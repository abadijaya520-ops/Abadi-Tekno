<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abadi Tekno - Jasa Servis Elektronik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .service-card { transition: all 0.3s ease; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .logo-container { border: 4px solid white; border-radius: 50%; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-slate-100">
    <div class="max-w-md w-full bg-white rounded-3xl overflow-hidden shadow-2xl">
        <div class="hero-gradient p-6 text-center text-white relative">
            <div class="flex justify-center mb-3">
                <div class="logo-container">
                    <div class="text-blue-900 text-3xl font-black italic">AT</div>
                </div>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight uppercase">ABADI TEKNO</h1>
            <p class="text-blue-100 text-xs font-light italic">"Solusi Pasti Masalah Elektronik Anda"</p>
        </div>
        <div class="p-5">
            <div class="mb-6 bg-slate-50 rounded-2xl p-4 border border-slate-200 shadow-sm">
                <div class="flex space-x-4 mb-4 border-b border-slate-200 text-[10px] font-bold uppercase tracking-wider">
                    <button onclick="switchTab('konsultasi')" id="tab-konsultasi" class="pb-2 tab-active">Konsultasi ✨</button>
                    <button onclick="switchTab('estimasi')" id="tab-estimasi" class="pb-2 text-slate-400">Estimasi Biaya ✨</button>
                    <button onclick="switchTab('tips')" id="tab-tips" class="pb-2 text-slate-400">Tips Rawat ✨</button>
                </div>
                <div class="relative mb-2">
                    <input id="user-query" type="text" placeholder="Ceritakan masalah perangkat Anda..." class="w-full text-sm p-3 pr-12 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="callGemini()" class="absolute right-2 top-2 bg-blue-600 text-white p-1.5 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-magic text-xs"></i>
                    </button>
                </div>
                <div id="ai-response" class="text-[11px] text-gray-600 hidden max-h-40 overflow-y-auto bg-white p-3 rounded-lg border border-blue-50 italic custom-scroll"></div>
                <div id="ai-loading" class="hidden flex flex-col items-center py-2">
                    <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600 mb-1"></div>
                    <div class="text-blue-600 text-[9px] font-bold">AI sedang memproses...</div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="service-card p-3 bg-white border border-gray-100 rounded-xl flex flex-col items-center text-center">
                    <i class="fas fa-mobile-alt text-xl text-blue-600 mb-1"></i>
                    <span class="text-[10px] font-semibold text-gray-700 leading-tight">Servis HP</span>
                </div>
                <div class="service-card p-3 bg-white border border-gray-100 rounded-xl flex flex-col items-center text-center">
                    <i class="fas fa-tv text-xl text-blue-600 mb-1"></i>
                    <span class="text-[10px] font-semibold text-gray-700 leading-tight">Servis TV</span>
                </div>
                <div class="service-card p-3 bg-white border border-gray-100 rounded-xl flex flex-col items-center text-center">
                    <i class="fas fa-tools text-xl text-blue-600 mb-1"></i>
                    <span class="text-[10px] font-semibold text-gray-700 leading-tight">Lainnya</span>
                </div>
            </div>
            <div class="bg-gray-900 rounded-2xl p-5 text-white text-center shadow-lg">
                <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Hubungi Kami Segera</p>
                <div class="flex items-center justify-center space-x-3 mb-2">
                    <i class="fab fa-whatsapp text-2xl text-green-400"></i>
                    <a href="https://wa.me/6282350006534" class="text-xl font-bold hover:text-blue-300">0823 5000 6534</a>
                </div>
            </div>
        </div>
        <div class="bg-gray-50 py-3 text-center text-gray-400 text-[9px]">© 2026 Abadi Tekno - Pati</div>
    </div>
    <script>
        // API KEY SUDAH DIPERBAIKI DI SINI
        const apiKey = "AIzaSyDzLk6_IGavhxVTFjMzugQ_l7LONxjreV0"; 

        let currentTab = 'konsultasi';
        function switchTab(tab) {
            currentTab = tab;
            ['konsultasi', 'estimasi', 'tips'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                el.className = t === tab ? 'pb-2 tab-active' : 'pb-2 text-slate-400';
            });
            document.getElementById('user-query').placeholder = tab === 'konsultasi' ? 'Ceritakan masalah perangkat Anda...' : (tab === 'estimasi' ? 'Berapa biaya ganti layar?' : 'Cara merawat kulkas...');
        }
        async function callGemini() {
            const query = document.getElementById('user-query').value.trim();
            if (!query) return;
            const resArea = document.getElementById('ai-response');
            const loading = document.getElementById('ai-loading');
            loading.classList.remove('hidden'); resArea.classList.add('hidden');
            let prompt = currentTab === 'konsultasi' ? "Diagnosa singkat masalah elektronik user (maks 2 kalimat)." : (currentTab === 'estimasi' ? "Beri rentang harga servis umum." : "Beri 2 tips perawatan.");
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: prompt + " Gunakan Bahasa Indonesia ramah." }] } })
                });
                const data = await response.json();
                resArea.innerHTML = "✨ " + data.candidates[0].content.parts[0].text;
                resArea.classList.remove('hidden');
            } catch (e) { resArea.innerText = "Error. Cek API Key atau hubungi WA."; resArea.classList.remove('hidden'); }
            finally { loading.classList.add('hidden'); }
        }
    </script>
</body>
</html>
