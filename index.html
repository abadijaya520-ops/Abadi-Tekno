<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abadi Tekno - Ahli Servis Elektronik Pati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        
        .hero-gradient { background: radial-gradient(circle at center, #1e40af 0%, #0f172a 100%); }
        .gold-text { background: linear-gradient(135deg, #fde047 0%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold { background: linear-gradient(135deg, #fde047 0%, #f59e0b 100%); color: #0f172a; }
        
        .logo-shield { width: 100px; height: 100px; background: rgba(30, 64, 175, 0.2); border: 3px solid #f59e0b; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        
        .feature-card { transition: all 0.3s ease; border: 1px solid rgba(241, 245, 249, 0.05); background: rgba(241, 245, 249, 0.02); }
        .feature-card:hover { border-color: #f59e0b; transform: translateY(-3px); background: rgba(241, 245, 249, 0.05); }
        
        .ai-bubble { background: #1e293b; border-radius: 18px; border-top-left-radius: 2px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #f59e0b; color: #f59e0b; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
        
        <div class="hero-gradient p-8 text-center border-b border-slate-800">
            <div class="flex justify-center mb-4">
                <div class="logo-shield">
                    <i class="fas fa-tools text-4xl text-blue-100"></i>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold gold-text">ABADI TEKNO</h1>
            <p class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em]">Ahli Servis Elektronik • Pati</p>
        </div>

        <div class="p-6 space-y-8">
            
            <div class="bg-slate-800/50 rounded-2xl p-5 border border-slate-700">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold flex items-center gap-2">
                        <i class="fas fa-robot text-blue-400"></i> Diagnosa AI
                    </h2>
                    <span class="text-[9px] bg-gold font-bold px-2 py-0.5 rounded-full">AKTIF</span>
                </div>

                <div class="relative mb-3">
                    <input id="user-query" type="text" placeholder="Contoh: TV saya gambarnya gelap..." 
                           class="w-full text-sm p-4 pr-12 rounded-xl bg-slate-950 border border-slate-700 focus:outline-none focus:ring-1 focus:ring-blue-500 text-slate-100">
                    <button onclick="callGemini()" class="absolute right-2 top-2 bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </div>

                <div id="ai-loading" class="hidden text-center py-2">
                    <div class="animate-spin inline-block w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full"></div>
                </div>

                <div id="ai-container" class="hidden mt-4">
                    <div id="ai-response" class="text-xs text-slate-300 ai-bubble p-4 border border-slate-700 italic"></div>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-bold mb-4 uppercase tracking-wider text-slate-400 flex items-center gap-2">
                    <i class="fas fa-clipboard-list text-gold"></i> Layanan Kami
                </h3>
                <div class="grid grid-cols-2 gap-3">
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-mobile-alt text-blue-400"></i>
                        <span class="text-xs font-medium">Servis HP</span>
                    </div>
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-tv text-blue-400"></i>
                        <span class="text-xs font-medium">Servis TV</span>
                    </div>
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-volume-up text-blue-400"></i>
                        <span class="text-xs font-medium">Power Audio</span>
                    </div>
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-soap text-blue-400"></i>
                        <span class="text-xs font-medium">Mesin Cuci</span>
                    </div>
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-fan text-blue-400"></i>
                        <span class="text-xs font-medium">Kipas Angin</span>
                    </div>
                    <div class="feature-card p-4 rounded-xl flex items-center gap-3">
                        <i class="fas fa-microchip text-blue-400"></i>
                        <span class="text-xs font-medium">Elektronik Lain</span>
                    </div>
                </div>
            </div>

            <div class="bg-blue-950/30 rounded-2xl p-6 text-center border border-blue-900/50">
                <p class="text-slate-400 text-[10px] uppercase font-bold mb-3">Hubungi Teknisi Sekarang</p>
                <a href="https://wa.me/6282350006534" class="inline-flex items-center gap-3 text-xl font-black gold-text">
                    <i class="fab fa-whatsapp text-2xl text-green-400"></i> 0823 5000 6534
                </a>
            </div>
        </div>

        <div class="bg-slate-950 py-3 text-center text-slate-600 text-[9px]">
            © 2026 ABADI TEKNO PATI - Cepat, Tepat, Bergaransi
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyA3DAZwwLUorBDkfSRN8MHRhL-bOQAzCaw"; 

        async function callGemini() {
            const query = document.getElementById('user-query').value;
            if (!query) return;
            
            const resArea = document.getElementById('ai-response');
            const loading = document.getElementById('ai-loading');
            const container = document.getElementById('ai-container');
            
            loading.classList.remove('hidden');
            container.classList.add('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Anda adalah teknisi ahli dari ABADI TEKNO PATI. Pelanggan bertanya: ${query}. Berikan jawaban teknis yang singkat, padat, dan ramah.` }] }]
                    })
                });
                const data = await response.json();
                resArea.innerText = data.candidates[0].content.parts[0].text;
                container.classList.remove('hidden');
            } catch (e) {
                resArea.innerText = "Maaf, sistem sibuk. Silakan hubungi via WhatsApp.";
                container.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
